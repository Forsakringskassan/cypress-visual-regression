name: Build

on: [push, pull_request]

permissions:
    contents: read

jobs:
    node:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: [22.x, 24.x]
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node-version }}
            - name: Install dependencies
              run: npm ci
            - name: Jest
              run: npm exec jest -- --ci
            - name: Build
              run: npm run --if-present build

    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
            - name: Use Node.js 22.x
              uses: actions/setup-node@v6
              with:
                  node-version: 22.x
            - name: Install dependencies
              run: npm ci
            - name: Prettier
              run: npm run prettier:check
            - name: ESLint
              if: success() || failure()
              run: npm run eslint || false

    npm-pkg-lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
            - name: Use Node.js
              uses: actions/setup-node@v6
            - name: Install Dependencies
              run: npm ci
            - name: npm-pkg-lint
              uses: ext/npm-pkg-lint@master

    cypress:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                cypress-version: [15.x]
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
            - name: Use Node.js 22
              uses: actions/setup-node@v6
              with:
                  node-version: 22
            - name: Install dependencies
              run: npm ci
            - name: Build
              run: npm run --if-present build
            - name: Install Cypress ${{ matrix.cypress-version }}
              run: npm install cypress@${{ matrix.cypress-version }}
            - name: Cypress
              run: npm exec cypress run
